<!DOCTYPE html>
<html>
<head>
    <title>Write a Post - Wendy's Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="card" style="max-width: 600px;">
        <h1>What's on your mind?</h1>
        
        <form method="POST">
            <input type="text" name="title" placeholder="Post Title" required>
            
            <textarea name="content" placeholder="Write your post here..." required 
                      style="width: 100%; height: 150px; padding: 14px; margin-bottom: 20px; border-radius: 10px; border: 2px solid #eee; font-family: inherit;"></textarea>
            
            <button type="submit">Publish Post</button>
        </form>
        
        <br>
        <a href="/feed">Cancel and go back</a>
    </div>
</body>
</html>
